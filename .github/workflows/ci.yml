name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -o checks-qe ./cmd/checks-qe/
      - name: Verify list
        run: ./checks-qe list
      - name: Vet
        run: go vet ./...

  integration-k8s:
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create K8s cluster
        uses: palmsoftware/quick-k8s@v0
        with:
          clusterName: checks-qe
          numWorkerNodes: '1'
          waitForPodsReady: 'true'
      - name: Build checks-qe
        run: go build -o checks-qe ./cmd/checks-qe/
      - name: Run scenarios
        run: ./checks-qe run --skip-ocp --skip-probe --parallel 4 --verbose

  integration-ocp:
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Create OCP cluster
        uses: palmsoftware/quick-ocp@v0
        with:
          ocpPullSecret: $OCP_PULL_SECRET
          bundleCache: true
          waitForOperatorsReady: true
        env:
          OCP_PULL_SECRET: ${{ secrets.CRC_PULL_SECRET }}
      - name: Build checks-qe
        run: go build -o checks-qe ./cmd/checks-qe/
      - name: Run scenarios
        run: ./checks-qe run --skip-probe --parallel 4 --verbose
