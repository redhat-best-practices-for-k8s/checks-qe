name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  GOTOOLCHAIN: local

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -o checks-qe ./cmd/checks-qe/
      - name: Verify list
        run: ./checks-qe list
      - name: Vet
        run: go vet ./...
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: checks-qe
          path: checks-qe
          retention-days: 1

  integration-k8s:
    runs-on: ubuntu-latest
    needs: [lint, build]
    strategy:
      fail-fast: false
      matrix:
        category:
          - access-control
          - affiliated-certification
          - lifecycle
          - manageability
          - networking
          - observability
          - operator
          - performance
          - platform-alteration
    steps:
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: checks-qe
      - name: Make binary executable
        run: chmod +x checks-qe
      - name: Create K8s cluster
        uses: palmsoftware/quick-k8s@v0
        with:
          clusterName: checks-qe
          numWorkerNodes: '1'
          waitForPodsReady: 'true'
      - name: Run ${{ matrix.category }} scenarios
        run: ./checks-qe run --skip-ocp --skip-probe --category "${{ matrix.category }}" --parallel 8 --verbose

  integration-ocp:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    needs: [lint, build]
    strategy:
      fail-fast: false
      matrix:
        category:
          - access-control
          - affiliated-certification
          - lifecycle
          - manageability
          - networking
          - observability
          - operator
          - performance
          - platform-alteration
    steps:
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: checks-qe
      - name: Make binary executable
        run: chmod +x checks-qe
      - name: Create OCP cluster
        uses: palmsoftware/quick-ocp@v0
        with:
          ocpPullSecret: $OCP_PULL_SECRET
          bundleCache: true
          waitForOperatorsReady: true
        env:
          OCP_PULL_SECRET: ${{ secrets.CRC_PULL_SECRET }}
      - name: Run ${{ matrix.category }} scenarios
        run: ./checks-qe run --skip-probe --category "${{ matrix.category }}" --parallel 8 --verbose
